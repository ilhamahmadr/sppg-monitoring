<!DOCTYPE html>
<html lang="id">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
SISTEM PROGRES PEMBANGUNAN SPPG
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BODY */
body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

position:relative;

background:
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop')
center/cover no-repeat;

}

/* OVERLAY */
body::before{

content:'';

position:absolute;

inset:0;

background:
rgba(0,0,0,.45);

backdrop-filter:blur(5px);

}

/* GLOW */
body::after{

content:'';

position:absolute;

width:500px;

height:500px;

background:
radial-gradient(
circle,
#8b5cf688,
transparent 70%
);

top:-120px;
right:-120px;

animation:glow 6s infinite alternate;

}

@keyframes glow{

0%{
transform:scale(1);
opacity:.5;
}

100%{
transform:scale(1.3);
opacity:1;
}

}

/* CARD */
.card{

position:relative;

z-index:2;

width:100%;

max-width:550px;

padding:35px;

border-radius:30px;

background:
rgba(255,255,255,.12);

border:
1px solid rgba(255,255,255,.2);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

box-shadow:
0 10px 40px rgba(0,0,0,.35);

animation:fadeUp 1s ease;

}

/* ANIMATION */
@keyframes fadeUp{

from{

opacity:0;

transform:
translateY(40px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

/* TITLE */
h1{

text-align:center;

margin-bottom:30px;

font-size:38px;

font-weight:800;

color:white;

text-shadow:
0 4px 10px rgba(0,0,0,.3);

}

/* INPUT */
input,
select,
textarea{

width:100%;

padding:17px;

margin-bottom:18px;

border:none;

outline:none;

border-radius:16px;

font-size:15px;

background:
rgba(0,0,0,.28);

color:white;

transition:.3s;

}

/* PLACEHOLDER */
input::placeholder,
textarea::placeholder{

color:#e5e5e5;

}

/* FOCUS */
input:focus,
select:focus,
textarea:focus{

transform:scale(1.02);

background:
rgba(0,0,0,.4);

box-shadow:
0 0 15px #8b5cf6;

}

/* OPTION */
select option{

color:black;

}

/* TEXTAREA */
textarea{

height:120px;

resize:none;

}

/* BUTTON */
button{

width:100%;

padding:17px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:18px;

font-weight:700;

color:white;

background:
linear-gradient(
90deg,
#7c3aed,
#a855f7
);

transition:.4s;

box-shadow:
0 10px 25px rgba(124,58,237,.45);

}

/* BUTTON HOVER */
button:hover{

transform:
translateY(-3px)
scale(1.02);

box-shadow:
0 15px 35px rgba(124,58,237,.65);

}

/* LOGOUT */
.logout{

margin-top:15px;

background:
linear-gradient(
90deg,
#ef4444,
#dc2626
);

}

.logout:hover{

box-shadow:
0 15px 35px rgba(239,68,68,.55);

}

/* INFO */
.info{

background:
rgba(255,255,255,.12);

padding:15px;

border-radius:16px;

margin-bottom:20px;

color:white;

backdrop-filter:blur(10px);

}

/* PREVIEW */
#preview{

margin-top:15px;

animation:fadeUp .5s ease;

}

/* IMAGE */
img,
video{

width:100%;

border-radius:20px;

margin-top:10px;

box-shadow:
0 8px 20px rgba(0,0,0,.35);

}

/* HIDDEN */
.hidden{

display:none;

}

/* MOBILE */
@media(max-width:600px){

.card{

padding:28px;

border-radius:25px;

}

h1{

font-size:30px;

}

button{

font-size:17px;

}

}

</style>

</head>
<body>



<!-- LOGIN -->

<div class="card"
id="loginBox"
data-aos="zoom-in">

<h1>

LOGIN ADMIN SPPG

</h1>



<input

id="username"

placeholder="Username"

>


<input

type="password"

id="password"

placeholder="Password"

>


<button
onclick="login()">

LOGIN

</button>


</div>





<!-- DASHBOARD -->

<div
class="card hidden"
id="dashboard"
data-aos="fade-up"
>

<h1>

UPLOAD PROGRES SPPG

</h1>



<div
class="info">

Admin:
<span id="namaAdmin">

</span>

</div>




<select
id="lokasi">

<option>

SPPG Grogol, Paliyan

</option>


<option>

SPPG Wonosari

</option>


<option>

SPPG Logandeng, Playen

</option>


<option>

SPPG Karangmojo

</option>


<option>

SPPG Semanu

</option>


<option>

SPPG Wonosari

</option>

</select>




<textarea

id="catatan"

placeholder="Masukkan catatan progres pembangunan"

>

</textarea>




<input

type="file"

id="file"

accept="image/*,video/*"

onchange="previewFile()"

>



<div id="preview">

</div>




<button

onclick="uploadData()"

>

UPLOAD PROGRES

</button>



<button

class="logout"

onclick="logout()"

>

LOGOUT

</button>



</div>




<script>




/*
==================
ADMIN
==================
*/


const admins=[


{

username:"admin1",

password:"12345"

},


{

username:"admin2",

password:"12345"

},


{

username:"admin3",

password:"12345"

},


{

username:"admin4",

password:"12345"

},


{

username:"admin5",

password:"12345"

},


{

username:"admin6",

password:"12345"

}


];






/*
==================
LOGIN
==================
*/


function login(){


let user=

document.getElementById(

"username"

).value;



let pass=

document.getElementById(

"password"

).value;



let admin=

admins.find(

a=>

a.username===user

&&

a.password===pass

);



if(admin){


localStorage.setItem(

"login",

"true"

);



localStorage.setItem(

"admin",

user

);



showDashboard();



}else{


alert(

"Username/password salah"

);


}



}





/*
==================
SHOW DASHBOARD
==================
*/


function showDashboard(){


document.getElementById(

"loginBox"

).classList.add(

"hidden"

);



document.getElementById(

"dashboard"

).classList.remove(

"hidden"

);



document.getElementById(

"namaAdmin"

).innerHTML=

localStorage.getItem(

"admin"

);



}




/*
==================
AUTO LOGIN
==================
*/


if(

localStorage.getItem(

"login"

)

==="true"

){

showDashboard();

}




/*
==================
LOGOUT
==================
*/


function logout(){


localStorage.clear();


location.reload();


}





/*
==================
PREVIEW
==================
*/


function previewFile(){


let file=

document.getElementById(

"file"

).files[0];


let preview=

document.getElementById(

"preview"

);


preview.innerHTML="";


if(!file)
return;



let url=

URL.createObjectURL(

file

);



if(

file.type.startsWith(

"image"

)

){

preview.innerHTML=

`<img src="${url}">`;

}


else{


preview.innerHTML=

`

<video
controls>

<source
src="${url}">

</video>

`;



}



}





/*
==================
UPLOAD
==================
*/


async function uploadData(){

let file=

document.getElementById(

"file"

).files[0];


if(!file){

alert(

"Pilih foto/video dulu"

);

return;

}


let reader=

new FileReader();


reader.onload=

async()=>{


let base64=

reader.result

.split(",")

[1];



let data={

admin:

localStorage.getItem(

"admin"

),

lokasi:

document.getElementById(

"lokasi"

).value,

catatan:

document.getElementById(

"catatan"

).value,

name:

file.name,

type:

file.type,

file:

base64

};



try{


let res=

await fetch(

"https://script.google.com/macros/s/AKfycbx9nplT5exUYmBkJm-cM0-P-_T_iNkZqc4aaBj-nhtMVJerZCsTujlsyO3MMFWEk6MAiw/exec",

{

method:

"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify(

data

)

}

);



let hasil=

await res.text();


alert(

hasil

);



}catch(err){


alert(

"Upload gagal:\n"

+

err

);


}


};



reader.readAsDataURL(

file

);

}



</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
duration:1000,
once:true
});

</script>

</body>
</html>
